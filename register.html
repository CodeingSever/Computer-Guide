<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก - คู่มือความรู้คอมพิวเตอร์</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <div class="login-bg"></div>

  <nav class="top-nav">
    <div class="container nav-inner">
      <a href="index.html" class="logo">Computer Guide</a>
      <ul class="nav-links">
        <li><a href="index.html">หน้าแรก</a></li>
        <li><a href="login.html">เข้าสู่ระบบ</a></li>
        <li><a href="register.html" class="nav-active">สมัครสมาชิก</a></li>
      </ul>
    </div>
  </nav>

  <main class="login-main">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <h1>สมัครสมาชิก</h1>
          <p>กรอกข้อมูลเพื่อสร้างบัญชีใหม่</p>
        </div>

        <form class="login-form" id="registerForm" novalidate>
          <div class="form-group">
            <label for="name">ชื่อผู้ใช้</label>
            <input type="text" id="name" name="name" placeholder="ชื่อที่ต้องการใช้" required />
            <span class="form-error" id="nameError" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="email">อีเมล</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required />
            <span class="form-error" id="emailError" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="password">รหัสผ่าน</label>
            <input type="password" id="password" name="password" placeholder="อย่างน้อย 8 ตัวอักษร" required minlength="8" />
            <span class="form-error" id="passwordError" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="password2">ยืนยันรหัสผ่าน</label>
            <input type="password" id="password2" name="password2" placeholder="กรอกรหัสผ่านอีกครั้ง" required />
            <span class="form-error" id="password2Error" aria-live="polite"></span>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">สมัครสมาชิก</button>
        </form>

        <p class="login-footer">
          มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
        </p>
      </div>
      <p class="back-home"><a href="index.html">← กลับไปหน้าแรก</a></p>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var form = document.getElementById("registerForm");
      var submitBtn = document.getElementById("submitBtn");
      function showError(id, msg) {
        var el = document.getElementById(id);
        if (el) { el.textContent = msg; el.style.display = msg ? "block" : "none"; }
      }
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        ["nameError", "emailError", "passwordError", "password2Error"].forEach(function (id) { showError(id, ""); });
        var name = document.getElementById("name").value.trim();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;
        var password2 = document.getElementById("password2").value;
        var hasError = false;
        if (!name) { showError("nameError", "กรุณากรอกชื่อผู้ใช้"); hasError = true; }
        if (!email) { showError("emailError", "กรุณากรอกอีเมล"); hasError = true; }
        if (!password) { showError("passwordError", "กรุณากรอกรหัสผ่าน"); hasError = true; }
        else if (password.length < 8) { showError("passwordError", "รหัสผ่านอย่างน้อย 8 ตัวอักษร"); hasError = true; }
        if (password !== password2) { showError("password2Error", "รหัสผ่านไม่ตรงกัน"); hasError = true; }
        if (hasError) return;
        submitBtn.disabled = true;
        submitBtn.textContent = "กำลังสมัคร...";
        setTimeout(function () {
          alert("ตอนนี้เป็นแบบฟอร์มตัวอย่าง ยังไม่ได้เชื่อมกับระบบหลังบ้าน");
          submitBtn.disabled = false;
          submitBtn.textContent = "สมัครสมาชิก";
        }, 800);
      });
    });
  </script>
</body>
</html>
